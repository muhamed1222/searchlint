    testExamples: [fixtures/indexability/yandex-not-searchable]
    documentation: docs/rules/SL-INDEX-012.md
    version: 1.0.0
  - id: SL-INDEX-013
    name: indexable-parameter-url
    category: indexability
    defaultSeverity: warning
    confidence: likely
    scope: page
    sources: [crawler, raw-html]
    providerScope: core
    description:
      "A query-parameter URL is indexable without an explicit route contract."
    checkingAlgorithm:
      "Detect indexable crawled URLs with query strings and no matching allow
