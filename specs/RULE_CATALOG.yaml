version: 1
status: defined
source: SEARCHLINT_1_0_DEVELOPMENT_PLAN.md
targetRuleCount: 120
ruleIdPattern: "SL-{CATEGORY}-{NNN}"
requiredRuleFields:
  - id
  - name
  - category
  - defaultSeverity
  - confidence
  - scope
  - sources
  - providerScope
  - description
  - checkingAlgorithm
  - requiredEvidence
  - fix
  - testExamples
  - documentation
  - version
qualityConstraints:
  - blocker cannot be based on subjective heuristic
  - title length is not a hard error
  - meta keywords is not checked
  - noindex is evaluated according to route purpose
  - Google and Yandex rules are not mixed
  - user can change severity through DSL
categories:
  - id: http-rendering
    title: HTTP and rendering
    targetCount: 12
  - id: indexability
    title: Indexability
    targetCount: 14
  - id: title-metadata
    title: Title and metadata
    targetCount: 18
  - id: canonical-hreflang
    title: Canonical and hreflang
    targetCount: 16
  - id: headings-structure
    title: Headings and structure
    targetCount: 8
  - id: images-social-preview
    title: Images and social preview
    targetCount: 12
  - id: schema-org
    title: Schema.org
    targetCount: 10
  - id: links-site-graph
    title: Links and site graph
    targetCount: 14
  - id: robots-sitemap
    title: robots.txt and sitemap
    targetCount: 10
  - id: performance-technical
    title: Performance and technical signals
    targetCount: 6
rules:
  - id: SL-HTTP-001
    name: non-success-indexable-response
    category: http-rendering
    defaultSeverity: blocker
    confidence: certain
    scope: page
    sources: [http-header, crawler]
    providerScope: core
    description: "An indexable route returns a non-2xx HTTP response."
    checkingAlgorithm:
      "Compare route indexability contract with final HTTP status after
      redirects."
    requiredEvidence: [route-contract, final-status-code, final-url]
    fix:
      "Return a 2xx response for indexable pages or mark the route
      non-indexable."
    testExamples: [fixtures/http/non-success-indexable]
    documentation: docs/rules/SL-HTTP-001.md
    version: 1.0.0
  - id: SL-HTTP-002
    name: redirect-chain-too-long
    category: http-rendering
    defaultSeverity: error
    confidence: certain
    scope: page
    sources: [http-header, crawler]
    providerScope: core
    description: "A URL resolves through more redirects than policy allows."
    checkingAlgorithm:
      "Count redirect hops in the normalized redirect chain and compare with
      policy."
    requiredEvidence: [redirect-chain, redirect-hop-count, policy-limit]
    fix:
      "Link directly to the final canonical destination or shorten the redirect
      chain."
    testExamples: [fixtures/http/redirect-chain-too-long]
    documentation: docs/rules/SL-HTTP-002.md
    version: 1.0.0
  - id: SL-HTTP-003
    name: redirect-loop
    category: http-rendering
    defaultSeverity: blocker
    confidence: certain
    scope: page
    sources: [http-header, crawler]
    providerScope: core
    description: "A redirect chain loops back to a previously observed URL."
    checkingAlgorithm:
      "Normalize each redirect target and detect repeated URLs in one chain."
    requiredEvidence: [redirect-chain, repeated-url]
    fix: "Fix redirect rules so the URL resolves to one final destination."
    testExamples: [fixtures/http/redirect-loop]
    documentation: docs/rules/SL-HTTP-003.md
    version: 1.0.0
  - id: SL-HTTP-004
    name: html-route-wrong-content-type
    category: http-rendering
    defaultSeverity: error
    confidence: certain
    scope: page
    sources: [http-header]
    providerScope: core
    description:
      "A route expected to serve HTML returns a non-HTML content type."
    checkingAlgorithm: "Compare route type with Content-Type header."
    requiredEvidence: [route-contract, content-type]
    fix: "Serve text/html for HTML routes or update the route contract."
    testExamples: [fixtures/http/wrong-content-type]
    documentation: docs/rules/SL-HTTP-004.md
    version: 1.0.0
  - id: SL-HTTP-005
    name: missing-raw-html-head
    category: http-rendering
    defaultSeverity: blocker
    confidence: certain
    scope: page
    sources: [raw-html]
    providerScope: core
    description: "Initial HTML lacks a usable head element."
    checkingAlgorithm:
      "Parse raw HTML and require exactly one head element for HTML pages."
    requiredEvidence: [raw-html-snapshot, html-parse-result]
    fix: "Ensure the HTML document includes a valid head element."
    testExamples: [fixtures/http/missing-raw-head]
    documentation: docs/rules/SL-HTTP-005.md
    version: 1.0.0
  - id: SL-HTTP-006
    name: missing-rendered-dom-head
    category: http-rendering
    defaultSeverity: blocker
    confidence: certain
    scope: page
    sources: [rendered-dom]
    providerScope: core
    description: "Rendered DOM lacks a usable head element."
    checkingAlgorithm: "Inspect rendered DOM and require one document head."
    requiredEvidence: [rendered-dom-snapshot, dom-selector]
    fix: "Fix rendering so the final document preserves a valid head element."
    testExamples: [fixtures/http/missing-rendered-head]
    documentation: docs/rules/SL-HTTP-006.md
    version: 1.0.0
  - id: SL-HTTP-007
    name: raw-rendered-title-mismatch
    category: http-rendering
    defaultSeverity: warning
    confidence: likely
    scope: page
    sources: [raw-html, rendered-dom]
    providerScope: core
    description: "Raw HTML title differs from rendered DOM title."
    checkingAlgorithm:
      "Extract title from raw HTML and rendered DOM and compare normalized
      values."
    requiredEvidence: [raw-title, rendered-title]
    fix:
      "Make server and rendered metadata agree unless the route is intentionally
      dynamic."
    testExamples: [fixtures/http/raw-rendered-title-mismatch]
    documentation: docs/rules/SL-HTTP-007.md
    version: 1.0.0
  - id: SL-HTTP-008
    name: raw-rendered-description-mismatch
    category: http-rendering
    defaultSeverity: warning
    confidence: likely
    scope: page
    sources: [raw-html, rendered-dom]
    providerScope: core
    description:
      "Raw HTML meta description differs from rendered DOM description."
    checkingAlgorithm:
      "Extract description from raw HTML and rendered DOM and compare normalized
      values."
    requiredEvidence: [raw-description, rendered-description]
    fix:
      "Make server and rendered descriptions agree unless the route is
      intentionally dynamic."
    testExamples: [fixtures/http/raw-rendered-description-mismatch]
    documentation: docs/rules/SL-HTTP-008.md
    version: 1.0.0
  - id: SL-HTTP-009
    name: required-metadata-rendered-only
    category: http-rendering
    defaultSeverity: error
    confidence: likely
    scope: page
    sources: [raw-html, rendered-dom]
    providerScope: core
    description:
      "Required metadata is missing from raw HTML and appears only after
      rendering."
    checkingAlgorithm:
      "Compare route-required metadata presence in raw HTML and rendered DOM."
    requiredEvidence:
      [route-contract, raw-metadata-state, rendered-metadata-state]
    fix: "Emit required SEO metadata in server-rendered HTML."
    testExamples: [fixtures/http/metadata-rendered-only]
    documentation: docs/rules/SL-HTTP-009.md
    version: 1.0.0
  - id: SL-HTTP-010
    name: response-time-over-policy
    category: http-rendering
    defaultSeverity: info
    confidence: heuristic
    scope: page
    sources: [http-header]
    providerScope: core
    description: "HTTP response timing exceeds the configured technical policy."
    checkingAlgorithm:
      "Compare measured response timing with route or site timing policy."
    requiredEvidence: [response-timing, policy-threshold]
    fix:
      "Investigate slow server response, cache behavior, or route rendering
      path."
    testExamples: [fixtures/http/response-time-over-policy]
    documentation: docs/rules/SL-HTTP-010.md
    version: 1.0.0
  - id: SL-HTTP-011
    name: rendered-html-lang-missing
    category: http-rendering
    defaultSeverity: warning
    confidence: certain
    scope: page
    sources: [rendered-dom]
    providerScope: core
    description: "Rendered html element has no lang attribute."
    checkingAlgorithm: "Inspect rendered documentElement lang attribute."
    requiredEvidence: [dom-selector, lang-value]
    fix: "Set a language on the html element."
    testExamples: [fixtures/http/rendered-lang-missing]
    documentation: docs/rules/SL-HTTP-011.md
    version: 1.0.0
  - id: SL-HTTP-012
    name: hydration-removes-required-metadata
    category: http-rendering
    defaultSeverity: error
    confidence: certain
    scope: page
    sources: [raw-html, rendered-dom]
    providerScope: core
    description:
      "Required metadata exists in raw HTML but is removed after rendering."
    checkingAlgorithm:
      "Compare required metadata keys before and after rendering."
    requiredEvidence:
      [route-contract, raw-metadata-state, rendered-metadata-state]
    fix:
      "Fix client rendering or framework metadata configuration so required
      metadata remains present."
    testExamples: [fixtures/http/hydration-removes-metadata]
    documentation: docs/rules/SL-HTTP-012.md
    version: 1.0.0
  - id: SL-INDEX-001
    name: unexpected-noindex
    category: indexability
    defaultSeverity: blocker
    confidence: certain
    scope: page
    sources: [raw-html, rendered-dom, http-header]
    providerScope: core
    description: "An indexable route contains a noindex directive."
    checkingAlgorithm:
      "Resolve route indexability and detect noindex in meta robots or
      X-Robots-Tag."
    requiredEvidence: [route-contract, discovered-directive]
    fix: "Remove noindex from indexable routes or update the route contract."
    testExamples: [fixtures/indexability/unexpected-noindex]
    documentation: docs/rules/SL-INDEX-001.md
    version: 1.0.0
  - id: SL-INDEX-002
    name: missing-noindex
    category: indexability
    defaultSeverity: blocker
    confidence: certain
    scope: page
    sources: [raw-html, rendered-dom, http-header]
    providerScope: core
    description: "A non-indexable route lacks a noindex directive."
    checkingAlgorithm:
      "Resolve route indexability and require noindex in HTML or headers."
    requiredEvidence: [route-contract, discovered-directive]
    fix: "Add noindex to non-indexable routes or update the route contract."
    testExamples: [fixtures/indexability/missing-noindex]
    documentation: docs/rules/SL-INDEX-002.md
    version: 1.0.0
  - id: SL-INDEX-003
    name: conflicting-index-directives
    category: indexability
    defaultSeverity: blocker
    confidence: certain
    scope: page
    sources: [raw-html, rendered-dom, http-header]
    providerScope: core
    description: "A page contains conflicting index and noindex directives."
    checkingAlgorithm:
      "Collect robots directives from HTML and headers and detect contradictory
      values."
    requiredEvidence: [meta-robots, x-robots-tag]
    fix:
      "Use one consistent indexability directive across HTML and HTTP headers."
    testExamples: [fixtures/indexability/conflicting-directives]
    documentation: docs/rules/SL-INDEX-003.md
    version: 1.0.0
  - id: SL-INDEX-004
    name: robots-blocks-indexable-route
    category: indexability
    defaultSeverity: blocker
    confidence: certain
    scope: page
    sources: [robots-txt, crawler]
    providerScope: core
    description: "robots.txt blocks crawling for a route declared indexable."
    checkingAlgorithm:
      "Match URL against robots rules for configured user agents and compare
      with route contract."
    requiredEvidence: [route-contract, robots-rule, matched-url]
    fix: "Allow crawling for indexable URLs or mark the route non-indexable."
    testExamples: [fixtures/indexability/robots-blocks-indexable]
    documentation: docs/rules/SL-INDEX-004.md
    version: 1.0.0
  - id: SL-INDEX-005
    name: sitemap-includes-noindex-url
    category: indexability
    defaultSeverity: error
    confidence: certain
    scope: site
    sources: [sitemap, raw-html, http-header]
    providerScope: core
    description: "A sitemap includes a URL that declares noindex."
    checkingAlgorithm:
      "Join sitemap URLs with collected indexability directives."
    requiredEvidence: [sitemap-entry, discovered-directive]
    fix: "Remove noindex URLs from sitemap or make them indexable."
    testExamples: [fixtures/indexability/sitemap-noindex]
    documentation: docs/rules/SL-INDEX-005.md
    version: 1.0.0
  - id: SL-INDEX-006
    name: noindex-rendered-only
    category: indexability
    defaultSeverity: error
    confidence: likely
    scope: page
    sources: [raw-html, rendered-dom]
    providerScope: core
    description: "A noindex directive appears only after JavaScript rendering."
    checkingAlgorithm: "Compare robots directives in raw HTML and rendered DOM."
    requiredEvidence: [raw-directives, rendered-directives]
    fix: "Emit indexability directives consistently in server-rendered HTML."
    testExamples: [fixtures/indexability/noindex-rendered-only]
    documentation: docs/rules/SL-INDEX-006.md
    version: 1.0.0
  - id: SL-INDEX-007
    name: x-robots-none-on-indexable-route
    category: indexability
    defaultSeverity: blocker
    confidence: certain
    scope: page
    sources: [http-header]
    providerScope: core
    description: "X-Robots-Tag contains none for an indexable route."
    checkingAlgorithm:
      "Parse X-Robots-Tag and compare none/noindex semantics with route
      contract."
    requiredEvidence: [route-contract, x-robots-tag]
    fix: "Remove X-Robots-Tag none from indexable responses."
    testExamples: [fixtures/indexability/x-robots-none]
    documentation: docs/rules/SL-INDEX-007.md
    version: 1.0.0
  - id: SL-INDEX-008
    name: unavailable-after-expired
    category: indexability
    defaultSeverity: blocker
    confidence: certain
    scope: page
    sources: [http-header, raw-html]
    providerScope: core
    description: "An indexable route has an unavailable_after date in the past."
    checkingAlgorithm:
      "Parse unavailable_after directive and compare with observedAt."
    requiredEvidence: [route-contract, unavailable-after-date, observed-at]
    fix: "Remove or update expired unavailable_after on indexable routes."
    testExamples: [fixtures/indexability/unavailable-after-expired]
    documentation: docs/rules/SL-INDEX-008.md
    version: 1.0.0
  - id: SL-INDEX-009
    name: canonical-target-noindex
    category: indexability
    defaultSeverity: error
    confidence: certain
    scope: page
    sources: [crawler, raw-html, http-header]
    providerScope: core
    description: "A page canonicalizes to a URL that is noindex."
    checkingAlgorithm:
      "Resolve canonical target snapshot and inspect its indexability
