    requiredEvidence: [canonical-url, target-directive]
    fix:
      "Canonicalize to an indexable target or remove noindex from the target."
    testExamples: [fixtures/indexability/canonical-target-noindex]
    documentation: docs/rules/SL-INDEX-009.md
    version: 1.0.0
  - id: SL-INDEX-010
    name: critical-assets-blocked-by-robots
    category: indexability
    defaultSeverity: warning
    confidence: heuristic
    scope: page
    sources: [robots-txt, rendered-dom]
    providerScope: core
    description: "Critical rendered assets appear blocked by robots.txt."
    checkingAlgorithm:
      "Identify critical linked assets and match them against robots rules."
    requiredEvidence: [asset-url, robots-rule]
    fix:
      "Allow crawling of critical render assets when they affect indexable
      content."
    testExamples: [fixtures/indexability/blocked-assets]
    documentation: docs/rules/SL-INDEX-010.md
    version: 1.0.0
  - id: SL-INDEX-011
    name: google-indexable-url-not-indexed
    category: indexability
    defaultSeverity: error
    confidence: certain
    scope: page
    sources: [google]
    providerScope: google
    description: "Google reports that an indexable route is not indexed."
    checkingAlgorithm:
      "Compare route contract with latest Google URL Inspection coverage state."
    requiredEvidence:
      [route-contract, google-observation, observed-at, fetched-at]
    fix:
      "Review Google exclusion reason and fix crawl, canonical, quality, or
