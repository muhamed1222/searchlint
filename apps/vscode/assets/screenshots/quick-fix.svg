<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">SearchLint quick fix screenshot</title>
  <desc id="desc">A deterministic VS Code marketplace screenshot showing a SearchLint quick fix and overlay command.</desc>
  <rect width="1280" height="720" fill="#101828" />
  <rect x="64" y="56" width="1152" height="608" rx="12" fill="#0b1120" stroke="#334155" />
  <rect x="64" y="56" width="1152" height="48" rx="12" fill="#111827" />
  <text x="96" y="87" font-family="Inter, Arial, sans-serif" font-size="17" fill="#e5e7eb">SearchLint SEO Language Support</text>
  <rect x="104" y="144" width="664" height="440" rx="8" fill="#111827" />
  <text x="136" y="190" font-family="Menlo, Consolas, monospace" font-size="19" fill="#cbd5e1">policy productPage &#123;</text>
  <text x="168" y="232" font-family="Menlo, Consolas, monospace" font-size="19" fill="#cbd5e1">schema Product</text>
  <text x="136" y="274" font-family="Menlo, Consolas, monospace" font-size="19" fill="#cbd5e1">&#125;</text>
  <text x="136" y="344" font-family="Menlo, Consolas, monospace" font-size="19" fill="#cbd5e1">route "/products/**" &#123;</text>
  <text x="168" y="386" font-family="Menlo, Consolas, monospace" font-size="19" fill="#cbd5e1">use productPage</text>
  <text x="168" y="428" font-family="Menlo, Consolas, monospace" font-size="19" fill="#fde68a">severity SL-INDEX-001 fatal</text>
  <text x="136" y="470" font-family="Menlo, Consolas, monospace" font-size="19" fill="#cbd5e1">&#125;</text>
  <rect x="544" y="392" width="360" height="152" rx="8" fill="#1f2937" stroke="#475569" />
  <text x="572" y="430" font-family="Inter, Arial, sans-serif" font-size="18" fill="#f9fafb">Quick Fix</text>
  <text x="572" y="470" font-family="Inter, Arial, sans-serif" font-size="16" fill="#d1d5db">Replace with severity 'warning'</text>
  <text x="572" y="506" font-family="Inter, Arial, sans-serif" font-size="16" fill="#d1d5db">Suppress this diagnostic</text>
  <rect x="824" y="144" width="328" height="180" rx="8" fill="#172033" />
  <text x="856" y="190" font-family="Inter, Arial, sans-serif" font-size="20" fill="#f9fafb">Command Palette</text>
  <text x="856" y="236" font-family="Inter, Arial, sans-serif" font-size="17" fill="#bfdbfe">SearchLint: Open SearchLint Overlay</text>
  <rect x="824" y="368" width="328" height="176" rx="8" fill="#172033" />
  <text x="856" y="414" font-family="Inter, Arial, sans-serif" font-size="20" fill="#f9fafb">No telemetry</text>
  <text x="856" y="460" font-family="Inter, Arial, sans-serif" font-size="17" fill="#d1d5db">Local editor checks use shared</text>
  <text x="856" y="490" font-family="Inter, Arial, sans-serif" font-size="17" fill="#d1d5db">SearchLint packages.</text>
</svg>
